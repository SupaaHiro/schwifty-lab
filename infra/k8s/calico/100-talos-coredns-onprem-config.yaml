---
# This section configures CoreDNS for an on-premises Talos deployment.
apiVersion: v1
data:
    Corefile: |
        .:53 {
            errors

            health {
                lameduck 5s
            }

            ready

            log . {
                class error
            }

            prometheus :9153

            hosts {
                10.96.0.1 kubernetes.default.svc.cluster.lab.local kubernetes.default.svc kubernetes.default
                fallthrough
            }

            kubernetes cluster.lab.local in-addr.arpa ip6.arpa {
                pods insecure
                fallthrough in-addr.arpa ip6.arpa
                ttl 30
            }

            # Forward lab.local directly to PowerDNS (10.244.0.12), the authoritative
            # server for lab.local. Direct forwarding is required so that cert-manager
            # DNS-01 propagation checks resolve NS/A records from the actual authoritative
            # source rather than through pfSense, which may return stale NS records.
            forward lab.local 10.244.0.12 {
               max_concurrent 1000
            }

            forward . /etc/resolv.conf {
               max_concurrent 1000
            }

            cache 30 {
               disable success cluster.lab.local
               disable denial cluster.lab.local
            }

            loop
            reload
            loadbalance
        }
kind: ConfigMap
metadata:
    name: coredns
    namespace: kube-system
