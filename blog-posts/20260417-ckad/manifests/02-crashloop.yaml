apiVersion: apps/v1
kind: Deployment
metadata:
  name: crashloop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crashloop
  template:
    metadata:
      labels:
        app: crashloop
    spec:
      containers:
        - name: app
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Starting up..."
              sleep 2
              echo "ERROR: missing required config file /etc/app/config.json"
              exit 1
          resources:
            limits:
              memory: 64Mi
              cpu: 50m
            requests:
              memory: 32Mi
              cpu: 25m
