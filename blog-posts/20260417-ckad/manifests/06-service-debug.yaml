apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: app
          image: nginx:1.27
          ports:
            - containerPort: 80
          resources:
            limits:
              memory: 128Mi
              cpu: 100m
            requests:
              memory: 64Mi
              cpu: 50m
---
apiVersion: v1
kind: Service
metadata:
  name: broken-service
spec:
  selector:
    # Intentional mismatch: pods are labeled "app: backend"
    # but the selector targets "app: backend-v2" — so no endpoints are created
    app: backend-v2
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
